<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JDI Academy — Cổng Đào Tạo Kinh Doanh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --navy: #0a1628;
    --navy-mid: #132240;
    --navy-light: #1e3a5f;
    --gold: #c9a84c;
    --gold-light: #e8c875;
    --gold-pale: #f5e9c8;
    --teal: #1a8fa0;
    --teal-light: #4db8cc;
    --white: #fafaf8;
    --gray-100: #f2f0eb;
    --gray-200: #e0ddd5;
    --gray-400: #9b9689;
    --gray-600: #5c5850;
    --success: #2d8a5e;
    --danger: #c0392b;
    --warning: #d4860a;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
    --shadow-sm: 0 2px 8px rgba(10,22,40,0.08);
    --shadow-md: 0 4px 20px rgba(10,22,40,0.12);
    --shadow-lg: 0 8px 40px rgba(10,22,40,0.18);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    font-family: var(--font-body);
    background: var(--gray-100);
    color: var(--navy);
    min-height: 100vh;
  }

  /* ─── AUTH SCREEN ─────────────────────────────── */
  #auth-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, #1a4a6e 100%);
    position: relative;
    overflow: hidden;
  }
  #auth-screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.6;
  }
  .auth-card {
    background: rgba(255,255,255,0.97);
    border-radius: 20px;
    padding: 48px 52px;
    width: 420px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.3);
    position: relative;
    z-index: 1;
  }
  .auth-logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo .logo-mark {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 56px; height: 56px;
    background: var(--navy);
    border-radius: 14px;
    margin-bottom: 12px;
  }
  .auth-logo .logo-mark span {
    font-family: var(--font-display);
    color: var(--gold);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .auth-logo h1 {
    font-family: var(--font-display);
    font-size: 24px;
    color: var(--navy);
    font-weight: 700;
  }
  .auth-logo p {
    color: var(--gray-400);
    font-size: 13px;
    margin-top: 4px;
  }
  .auth-tabs {
    display: flex;
    background: var(--gray-100);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--gray-400);
    transition: all 0.2s;
    border: none;
    background: none;
  }
  .auth-tab.active {
    background: white;
    color: var(--navy);
    box-shadow: var(--shadow-sm);
  }
  .form-group { margin-bottom: 18px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray-600);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--navy);
    background: white;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus { border-color: var(--teal); }
  .form-select {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    color: var(--navy);
    background: white;
    outline: none;
    cursor: pointer;
  }
  .btn-primary {
    width: 100%;
    padding: 13px;
    background: var(--navy);
    color: var(--gold);
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .btn-primary:hover { background: var(--navy-light); transform: translateY(-1px); }
  .auth-error {
    color: var(--danger);
    font-size: 13px;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: #fdf0ef;
    border-radius: 6px;
    display: none;
  }
  .auth-hint {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--gray-400);
  }

  /* ─── MAIN APP ──────────────────────────────────── */
  #app { display: none; min-height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    left: 0; top: 0; bottom: 0;
    width: 260px;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    z-index: 100;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 28px 24px 20px;
    border-bottom: 1px solid rgba(201,168,76,0.15);
  }
  .sidebar-logo .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .sidebar-logo .logo-box {
    width: 36px; height: 36px;
    background: var(--gold);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    color: var(--navy);
  }
  .sidebar-logo .logo-text {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 700;
    color: white;
    line-height: 1.1;
  }
  .sidebar-logo .logo-sub {
    font-size: 10px;
    color: var(--gold);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .sidebar-user {
    padding: 16px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-user .user-name {
    font-size: 13px;
    font-weight: 600;
    color: white;
  }
  .sidebar-user .user-role {
    font-size: 11px;
    color: rgba(201,168,76,0.8);
    margin-top: 2px;
  }
  .sidebar-nav { padding: 16px 12px; flex: 1; }
  .nav-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.3);
    font-weight: 600;
    padding: 0 12px;
    margin: 16px 0 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 8px;
    color: rgba(255,255,255,0.65);
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.18s;
    margin-bottom: 2px;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
  .nav-item.active { background: rgba(201,168,76,0.12); color: var(--gold-light); }
  .nav-item .nav-icon { font-size: 16px; width: 20px; text-align: center; }
  .sidebar-bottom {
    padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .btn-logout {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 12px;
    border-radius: 8px;
    color: rgba(255,255,255,0.45);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.18s;
    border: none;
    background: none;
    width: 100%;
  }
  .btn-logout:hover { color: rgba(255,255,255,0.8); }

  /* MAIN CONTENT */
  .main {
    margin-left: 260px;
    min-height: 100vh;
  }
  .topbar {
    background: white;
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--gray-200);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .topbar-title {
    font-family: var(--font-display);
    font-size: 19px;
    font-weight: 600;
    color: var(--navy);
  }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .progress-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--gold-pale);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    color: var(--navy);
  }
  .content { padding: 32px; }

  /* ─── DASHBOARD ──────────────────────────────── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: white;
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
  }
  .stat-card .stat-label {
    font-size: 12px;
    color: var(--gray-400);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .stat-card .stat-value {
    font-family: var(--font-display);
    font-size: 32px;
    font-weight: 700;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-card .stat-sub {
    font-size: 12px;
    color: var(--gray-400);
  }
  .stat-card.gold { border-top: 3px solid var(--gold); }
  .stat-card.teal { border-top: 3px solid var(--teal); }
  .stat-card.green { border-top: 3px solid var(--success); }
  .stat-card.red { border-top: 3px solid var(--danger); }

  .panel-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 28px; }
  .panel {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    overflow: hidden;
  }
  .panel-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .panel-title {
    font-family: var(--font-display);
    font-size: 16px;
    font-weight: 600;
    color: var(--navy);
  }
  .panel-body { padding: 24px; }
  
  .module-progress-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .module-progress-row:last-child { border-bottom: none; }
  .module-num {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: var(--navy);
    color: var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .module-num.done { background: var(--success); color: white; }
  .module-num.active { background: var(--teal); color: white; }
  .module-prog-info { flex: 1; }
  .module-prog-name { font-size: 13px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }
  .module-prog-sub { font-size: 11px; color: var(--gray-400); }
  .progress-bar-wrap { width: 120px; }
  .progress-bar {
    height: 6px;
    background: var(--gray-200);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 3px;
    transition: width 0.4s ease;
  }
  .progress-pct { font-size: 11px; color: var(--gray-400); text-align: right; margin-top: 3px; }

  .leaderboard-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--gray-100);
  }
  .leaderboard-row:last-child { border-bottom: none; }
  .lb-rank { font-size: 12px; font-weight: 700; color: var(--gray-400); width: 20px; text-align: center; }
  .lb-rank.first { color: var(--gold); }
  .lb-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .lb-name { flex: 1; font-size: 13px; font-weight: 500; }
  .lb-score { font-size: 13px; font-weight: 700; color: var(--navy); }
  .lb-badge { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .badge-gold { background: var(--gold-pale); color: #8a6a1a; }
  .badge-silver { background: #f0f0f0; color: #666; }
  .badge-bronze { background: #fdf0e8; color: #8a4a1a; }

  /* ─── MODULES PAGE ──────────────────────────── */
  .modules-hero {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
    border-radius: var(--radius);
    padding: 32px 36px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .modules-hero::after {
    content: '🏖️';
    position: absolute;
    right: 36px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 64px;
    opacity: 0.3;
  }
  .modules-hero h2 {
    font-family: var(--font-display);
    font-size: 26px;
    color: white;
    margin-bottom: 8px;
  }
  .modules-hero p { color: rgba(255,255,255,0.65); font-size: 14px; max-width: 480px; }
  .modules-hero .hero-progress {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 20px;
  }
  .hero-prog-bar {
    flex: 1;
    max-width: 300px;
    height: 8px;
    background: rgba(255,255,255,0.15);
    border-radius: 4px;
    overflow: hidden;
  }
  .hero-prog-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 4px;
    transition: width 0.5s ease;
  }
  .hero-prog-label { color: var(--gold-light); font-size: 13px; font-weight: 600; }

  .module-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
  .module-card {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    overflow: hidden;
    cursor: pointer;
    transition: all 0.2s;
  }
  .module-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .module-card.locked { opacity: 0.65; cursor: not-allowed; }
  .module-card.locked:hover { transform: none; box-shadow: var(--shadow-sm); }
  .module-card-header {
    padding: 22px 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .module-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .icon-1 { background: linear-gradient(135deg, #e3f0ff, #c5deff); }
  .icon-2 { background: linear-gradient(135deg, #e3fff5, #c5f0df); }
  .icon-3 { background: linear-gradient(135deg, #fff8e3, #ffefc5); }
  .icon-4 { background: linear-gradient(135deg, #f5e3ff, #e8c5ff); }
  .module-card-info { flex: 1; }
  .module-tag {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--teal);
    margin-bottom: 4px;
  }
  .module-card-title {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .module-card-desc { font-size: 12.5px; color: var(--gray-600); line-height: 1.5; }
  .module-card-footer {
    padding: 14px 24px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .module-meta { display: flex; gap: 16px; }
  .module-meta-item { font-size: 12px; color: var(--gray-400); }
  .module-meta-item strong { color: var(--navy); }
  .module-status {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .status-done { background: #e8f7ef; color: var(--success); }
  .status-active { background: #e3f6f9; color: var(--teal); }
  .status-locked { background: var(--gray-100); color: var(--gray-400); }
  .status-pending { background: var(--gold-pale); color: #8a6a1a; }

  /* ─── LESSON VIEW ──────────────────────────── */
  .lesson-container { display: grid; grid-template-columns: 1fr 300px; gap: 24px; align-items: start; }
  .lesson-main {
    background: white;
    border-radius: var(--radius);
    box-shadow: var(--shadow-sm);
    border: 1px solid var(--gray-200);
    overflow: hidden;
  }
  .lesson-header {
    padding: 28px 32px;
    border-bottom: 1px solid var(--gray-100);
    background: linear-gradient(135deg, #f8fafc, white);
  }
  .lesson-breadcrumb { font-size: 12px; color: var(--gray-400); margin-bottom: 8px; }
  .lesson-title {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 8px;
  }
  .lesson-meta { display: flex; gap: 20px; }
  .lesson-meta-item { font-size: 12px; color: var(--gray-400); }
  .lesson-body { padding: 32px; }
  .lesson-section { margin-bottom: 32px; }
  .lesson-section h3 {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 600;
    color: var(--navy);
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--gold-pale);
  }
  .lesson-section p {
    font-size: 14.5px;
    line-height: 1.75;
    color: var(--gray-600);
    margin-bottom: 12px;
  }
  .info-box {
    border-left: 3px solid var(--teal);
    background: #f0fafc;
    padding: 16px 18px;
    border-radius: 0 8px 8px 0;
    margin: 16px 0;
  }
  .info-box.gold { border-color: var(--gold); background: var(--gold-pale); }
  .info-box.warning { border-color: var(--warning); background: #fff8ed; }
  .info-box p { font-size: 13.5px; color: var(--navy); margin: 0; font-weight: 500; }
  .lesson-list { list-style: none; }
  .lesson-list li {
    padding: 8px 0 8px 24px;
    position: relative;
    font-size: 14px;
    color: var(--gray-600);
    line-height: 1.6;
  }
  .lesson-list li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--teal);
    font-size: 12px;
    top: 10px;
  }
  .lesson-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 16px 0;
  }
  .lesson-table th {
    background: var(--navy);
    color: var(--gold);
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
  }
  .lesson-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--gray-100);
    color: var(--gray-600);
  }
  .lesson-table tr:nth-child(even) td { background: #fafaf8; }
  .lesson-nav {
    padding: 20px 32px;
    border-top: 1px solid var(--gray-100);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .btn-nav {
    padding: 10px 22px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
  }
  .btn-nav-secondary {
    background: var(--gray-100);
    color: var(--gray-600);
  }
  .btn-nav-secondary:hover { background: var(--gray-200); }
  .btn-nav-primary {
    background: var(--navy);
    color: var(--gold);
  }
  .btn-nav-primary:hover { background: var(--navy-light); }
  .btn-quiz {
    background: var(--teal);
    color: white;
  }
  .btn-quiz:hover { background: #158091; }

  /* SIDEBAR OUTLINE */
  .lesson-outline {

//  SUPABASE AUTH
// ═══════════════════════════════════════════════
sb.auth.onAuthStateChange(async (event, session) => {
  if (session?.user) {
    const u = session.user;
    const meta = u.user_metadata || {};

    // Load tiến độ bài học từ Supabase
    const { data: progressRows } = await sb.from('progress')
      .select('lesson_id, completed')
      .eq('user_id', u.id)
      .eq('completed', true);

    const completedLessons = progressRows ? progressRows.map(r => r.lesson_id) : [];

    // Tính tiến độ từng module dựa trên bài đã hoàn thành
    const prog = {1:0, 2:0, 3:0, 4:0};
    MODULES.forEach(m => {
      const modLessons = m.lessons_data.map(l => l.id);
      const modDone = modLessons.filter(id => completedLessons.includes(id)).length;
      if (modDone > 0) prog[m.id] = Math.round((modDone / modLessons.length) * 70);
    });

    // Load điểm quiz
    const { data: quizRows } = await sb.from('quiz_results')
      .select('*')
      .eq('user_id', u.id);
    const quizScores = {};
    if (quizRows) quizRows.forEach(r => { if (r.module_id) quizScores[r.module_id] = r.score; });

    currentUser = {
      id: u.id,
      email: u.email,
      name: meta.full_name || u.email.split('@')[0],
      role: meta.role || 'sale',
      branch: meta.branch === 'nhatrang' ? 'Nha Trang' : 'Hà Nội',
      joined: u.created_at ? u.created_at.split('T')[0] : '2025-01-01',
      avatar_url: meta.avatar_url || null,
      phone: meta.phone || '',
      bio: meta.bio || '',
      progress: prog,
      quizScores: quizScores,
      completedLessons: completedLessons
    };
    USERS[u.email] = currentUser;
    startApp();
  } else {
    currentUser = null;
    document.getElementById('auth-screen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('login-form').classList.toggle('hidden', tab!=='login');
  document.getElementById('register-form').classList.toggle('hidden', tab!=='register');
  document.getElementById('auth-error').style.display='none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!email || !pass) { errEl.textContent='Vui lòng điền đầy đủ thông tin.'; errEl.style.display='block'; return; }
  const btn = document.querySelector('#login-form .btn-primary');
  btn.textContent = 'Đang đăng nhập...'; btn.disabled = true;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.textContent = 'Đăng nhập →'; btn.disabled = false;
  if (error) { errEl.textContent = 'Email hoặc mật khẩu không đúng.'; errEl.style.display='block'; }
}

async function doRegister() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const branch = document.getElementById('reg-branch').value;
  const errEl = document.getElementById('auth-error');
  errEl.style.display = 'none';
  if (!name || !email || !pass) { errEl.textContent='Vui lòng điền đầy đủ thông tin.'; errEl.style.display='block'; return; }
  if (pass.length < 6) { errEl.textContent='Mật khẩu tối thiểu 6 ký tự.'; errEl.style.display='block'; return; }
  const btn = document.querySelector('#register-form .btn-primary');
  btn.textContent = 'Đang tạo...'; btn.disabled = true;
  const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { full_name: name, branch, role: 'sale' } } });
  btn.textContent = 'Tạo tài khoản →'; btn.disabled = false;
  if (error) { errEl.textContent = error.message; errEl.style.display='block'; return; }
  errEl.style.cssText = 'display:block;background:#e8f7ef;color:#2d8a5e;';
  errEl.textContent = `✓ Tài khoản đã tạo! Kiểm tra email xác nhận rồi đăng nhập.`;
}

async function doLogout() {
  await sb.auth.signOut();
}

function startApp() {
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('sidebar-name').textContent = currentUser.name;
  document.getElementById('sidebar-role').textContent = currentUser.role==='admin' ? '⭐ Admin / Quản trị' : `📍 ${currentUser.branch} — Kinh doanh`;
  if (currentUser.role==='admin') {
    document.getElementById('nav-admin').style.display='flex';
    document.getElementById('nav-content').style.display='flex';
    document.getElementById('nav-admin-section').style.display='block';
  }
  showPage('dashboard');
}

async function adminAddUser() {
  const name = document.getElementById('adm-name').value.trim();
  const email = document.getElementById('adm-email').value.trim().toLowerCase();
  const branch = document.getElementById('adm-branch').value;
  const pass = document.getElementById('adm-pass').value || 'jdiland123';

function showPage(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const titles = { dashboard:'Tổng quan', modules:'Lộ trình học', quiz:'Kiểm tra', admin:'Quản lý nhân sự', content:'Quản lý nội dung', lesson:'Bài học', profile:'Thông tin cá nhân' };
  document.getElementById('topbar-title').textContent = titles[page] || page;
  updateProgressPill();
  const pc = document.getElementById('page-content');
  if (page==='dashboard') { renderDashboard(pc); }
  else if (page==='modules') { renderModules(pc); }
  else if (page==='lesson') { renderLesson(pc); }
  else if (page==='quiz') { renderQuiz(pc); }
  else if (page==='admin') { renderAdmin(pc); }
  else if (page==='content') { renderContent(pc); }
  else if (page==='profile') { renderProfile(pc); }
  // highlight nav
  const navMap = { dashboard:0, modules:1, quiz:2, admin:3, content:4 };
  const items = document.querySelectorAll('.nav-item');
  if(navMap[page]!==undefined) items[navMap[page]]?.classList.add('active');
}

function updateProgressPill() {
  const prog = currentUser.progress;
  const total = Object.values(prog).reduce((a,b)=>a+b,0);
  const pct = Math.round(total/4);
  document.getElementById('topbar-progress').textContent = `🎯 Tiến độ: ${pct}%`;
}

    <h3>4. Điểm rẽ nhánh từ P4 — Hai con đường sự nghiệp</h3>
    <p>Từ P4 (Chuyên viên Senior), bạn tự chọn hướng phát triển: <strong>Nhánh A — Chuyên gia Bán hàng</strong> hoặc <strong>Nhánh B — Quản lý Đội nhóm</strong>. Không bắt buộc lên quản lý nếu không muốn.</p>

    <h3>6. Nhánh B — Quản lý Đội nhóm (M1–M4)</h3>

function renderLesson(el) {
  if (!currentModule) { showPage('modules'); return; }
  const lesson = currentModule.lessons_data[currentLesson];
  const content = LESSON_CONTENT[lesson.content] || '<p>Nội dung đang được cập nhật.</p>';
  const isLast = currentLesson === currentModule.lessons_data.length - 1;
  const isFirst = currentLesson === 0;

  el.innerHTML = `
    <div class="lesson-container">
      <div class="lesson-main">
        <div class="lesson-header">
          <div class="lesson-breadcrumb">Module ${currentModule.id}: ${currentModule.title} › Bài ${currentLesson+1}</div>
          <div class="lesson-title">${lesson.title}</div>
          <div class="lesson-meta">
            <div class="lesson-meta-item">⏱ ${lesson.duration}</div>
            <div class="lesson-meta-item">📖 Bài ${currentLesson+1}/${currentModule.lessons_data.length}</div>
          </div>
        </div>
        <div class="lesson-body">${content}</div>
        <div class="lesson-nav">
          <button class="btn-nav btn-nav-secondary" onclick="prevLesson()" ${isFirst?'disabled style="opacity:0.4"':''}>← Trước</button>
          <span style="font-size:12px;color:var(--gray-400)">${currentLesson+1} / ${currentModule.lessons_data.length}</span>
          ${isLast
            ? `<button class="btn-nav btn-quiz" onclick="startQuiz(${currentModule.id})">Làm kiểm tra module →</button>`
            : `<button class="btn-nav btn-nav-primary" onclick="nextLesson()">Tiếp theo →</button>`
          }
        </div>
      </div>
      <div class="lesson-outline">
        <div class="outline-header"><div class="outline-title">Nội dung module</div></div>
        <div class="outline-list">
          ${currentModule.lessons_data.map((l,i)=>{
            const done = USERS[currentUser.email]?.completedLessons?.includes(l.id);
            const active = i===currentLesson;
            return `<div class="outline-item ${active?'active':''}" onclick="jumpLesson(${i})">
              <div class="outline-dot ${done?'dot-done':active?'dot-active':'dot-pending'}">${done?'✓':i+1}</div>
              <div class="outline-item-text">${l.title}</div>
            </div>`;
          }).join('')}
          <div style="height:8px"></div>
          <div class="outline-item" onclick="startQuiz(${currentModule.id})" style="cursor:pointer">
            <div class="outline-dot" style="background:var(--teal);color:white;font-size:9px">✏️</div>
            <div class="outline-item-text" style="color:var(--teal);font-weight:600">Kiểm tra module</div>
          </div>
        </div>
      </div>
    </div>
  `;
  // mark lesson as read
  if (!USERS[currentUser.email].completedLessons) USERS[currentUser.email].completedLessons = [];
  if (!USERS[currentUser.email].completedLessons.includes(lesson.id)) {
    USERS[currentUser.email].completedLessons.push(lesson.id);
    currentUser.completedLessons = USERS[currentUser.email].completedLessons;
    // update progress
    const modLessons = currentModule.lessons_data.map(l=>l.id);
    const modDone = modLessons.filter(id=>USERS[currentUser.email].completedLessons.includes(id)).length;
    USERS[currentUser.email].progress[currentModule.id] = Math.round((modDone/modLessons.length)*70);
    currentUser.progress = USERS[currentUser.email].progress;
    updateProgressPill();
    // Lưu vào Supabase
    saveLessonProgress(lesson.id, currentModule.id);
  }
}

function prevLesson() {
  if (currentLesson > 0) { currentLesson--; renderLesson(document.getElementById('page-content')); }
}

async function saveLessonProgress(lessonId, moduleId) {
  if (!currentUser?.id) return;
  try {
    // Lưu bài học đã hoàn thành
    await sb.from('progress').upsert({
      user_id: currentUser.id,
      lesson_id: lessonId,
      completed: true,
      completed_at: new Date().toISOString()
    }, { onConflict: 'user_id,lesson_id' });
  } catch(e) { console.warn('Không thể lưu tiến độ:', e); }
}
function nextLesson() {
  if (currentLesson < currentModule.lessons_data.length - 1) { currentLesson++; renderLesson(document.getElementById('page-content')); }
}
function jumpLesson(i) { currentLesson = i; renderLesson(document.getElementById('page-content')); }

function startQuiz(moduleId) {
  currentQuizModule = moduleId;
  quizState = { qIndex:0, answers:[], answered:false, score:0, total: QUIZ_DATA[moduleId].questions.length };
  showPage('quiz');
}

function renderQuiz(el) {
  const qd = QUIZ_DATA[currentQuizModule];
  if (!qd) {
    el.innerHTML = `<div class="quiz-wrap"><div class="empty-state"><div class="empty-icon">✏️</div><p>Chọn một module để làm bài kiểm tra</p></div></div>`;
    return;
  }
  if (quizState.qIndex >= qd.questions.length) { renderResult(el); return; }
  const q = qd.questions[quizState.qIndex];
  const pct = (quizState.qIndex / qd.questions.length) * 100;
  const letters = ['A','B','C','D'];
  el.innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-header">
        <h2>${qd.title}</h2>
        <p>Điểm đạt: ${qd.passMark}/100 · ${qd.questions.length} câu hỏi</p>
        <div class="quiz-progress-row">
          <div class="quiz-prog-bar"><div class="quiz-prog-fill" style="width:${pct}%"></div></div>
          <div class="quiz-prog-label">Câu ${quizState.qIndex+1}/${qd.questions.length}</div>
        </div>
      </div>
      <div class="question-card">
        <div class="question-num">Câu hỏi ${quizState.qIndex+1}</div>
        <div class="question-text">${q.q}</div>
        <div class="option-list" id="options-list">
          ${q.opts.map((opt,i)=>`
            <div class="option-item" id="opt-${i}" onclick="selectOption(${i})">
              <div class="option-letter" id="opt-letter-${i}">${letters[i]}</div>
              <div class="option-text">${opt}</div>
            </div>
          `).join('')}
        </div>
        <div class="explanation" id="explanation">
          <p>💡 ${q.explain}</p>
        </div>
      </div>
      <div class="quiz-actions">
        <div style="font-size:13px;color:var(--gray-400)">Đã trả lời: ${quizState.answers.length} câu</div>
        <div style="display:flex;gap:10px">
          <button class="btn-check" id="btn-check" onclick="checkAnswer()" disabled>Kiểm tra đáp án</button>
          <button class="btn-next show" id="btn-next" onclick="nextQuestion()" style="display:none">Câu tiếp theo →</button>
        </div>
      </div>
    </div>
  `;
  quizState.answered = false;
  quizState.selectedOpt = null;
}

function selectOption(i) {
  if (quizState.answered) return;
  document.querySelectorAll('.option-item').forEach(o=>o.classList.remove('selected'));
  document.getElementById(`opt-${i}`).classList.add('selected');
  quizState.selectedOpt = i;
  document.getElementById('btn-check').disabled = false;
}

function checkAnswer() {
  if (quizState.answered || quizState.selectedOpt === null) return;
  quizState.answered = true;
  const q = QUIZ_DATA[currentQuizModule].questions[quizState.qIndex];
  const sel = quizState.selectedOpt;
  const correct = q.ans;
  const isCorrect = sel === correct;
  if (isCorrect) quizState.score++;
  quizState.answers.push({ selected: sel, correct, isCorrect });
  document.getElementById(`opt-${sel}`).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) document.getElementById(`opt-${correct}`).classList.add('correct');
  document.getElementById('explanation').classList.add('show');
  document.getElementById('btn-check').disabled = true;
  document.getElementById('btn-next').style.display = 'block';
  if (quizState.qIndex === QUIZ_DATA[currentQuizModule].questions.length - 1) {
    document.getElementById('btn-next').textContent = 'Xem kết quả →';
  }
}

function nextQuestion() {
  quizState.qIndex++;
  renderQuiz(document.getElementById('page-content'));
}

function renderResult(el) {
  const qd = QUIZ_DATA[currentQuizModule];
  const pct = Math.round((quizState.score / qd.questions.length) * 100);
  const pass = pct >= qd.passMark;
  const wrong = qd.questions.length - quizState.score;
  USERS[currentUser.email].quizScores[currentQuizModule] = pct;
  currentUser.quizScores = USERS[currentUser.email].quizScores;
  if (pass) {
    USERS[currentUser.email].progress[currentQuizModule] = 100;
    currentUser.progress = USERS[currentUser.email].progress;
    updateProgressPill();
  }
  el.innerHTML = `
    <div style="padding-top:40px">
      <div class="result-card">
        <div class="result-score-ring" style="--pct:${pct}%">
          <div class="score-num">${pct}</div>
          <div class="score-label">điểm</div>
        </div>
        <div class="result-title">${pass ? '🎉 Chúc mừng! Bạn đã đạt!' : '😟 Chưa đạt — Hãy thử lại'}</div>
        <div class="result-sub">${pass ? `Module ${currentQuizModule} đã hoàn thành. Chuyển sang module tiếp theo!` : `Cần đạt tối thiểu ${qd.passMark} điểm. Xem lại bài học và thử lại.`}</div>
        <div class="result-breakdown">
          <div class="breakdown-item"><div class="breakdown-num" style="color:var(--success)">${quizState.score}</div><div class="breakdown-label">Đúng</div></div>
          <div class="breakdown-item"><div class="breakdown-num" style="color:var(--danger)">${wrong}</div><div class="breakdown-label">Sai</div></div>
          <div class="breakdown-item"><div class="breakdown-num">${pct}</div><div class="breakdown-label">Điểm</div></div>
        </div>
        <div class="result-actions">
          <button class="btn-retry" onclick="retryQuiz()">Làm lại</button>
          <button class="btn-continue" onclick="showPage('modules')">Về lộ trình →</button>
        </div>
      </div>
    </div>
  `;
  if (pass) showToast(`✅ Đạt ${pct} điểm! Module ${currentQuizModule} hoàn thành.`);
  else showToast(`❌ Chưa đạt — ${pct} điểm. Cần ${qd.passMark} điểm.`);
}

function retryQuiz() {
  quizState = { qIndex:0, answers:[], answered:false, score:0, total: QUIZ_DATA[currentQuizModule].questions.length };
  renderQuiz(document.getElementById('page-content'));
}

function renderAdmin(el) {
  const saleUsers = Object.entries(USERS).filter(([,u])=>u.role==='sale');
  const avatarColors = ['#1a8fa0','#c9a84c','#2d8a5e','#7b52ab','#c0392b','#e67e22'];
  
  function getOverallProg(u) { return Math.round(Object.values(u.progress).reduce((a,b)=>a+b,0)/4); }
  function getAvgScore(u) { const s=Object.values(u.quizScores); return s.length?Math.round(s.reduce((a,b)=>a+b,0)/s.length):0; }
  function getStatus(u) {
    const p=getOverallProg(u);
    if(p===100) return ['tag-green','Hoàn thành'];
    if(p>0) return ['tag-blue','Đang học'];
    return ['tag-gray','Chưa bắt đầu'];

    <div id="admin-tab-content"></div>
  `;
  renderAdminTab();
}

            <th>Nhân viên</th><th>Chi nhánh</th><th>Tiến độ</th><th>Điểm TB</th><th>Ngày gia nhập</th><th>Trạng thái</th><th>Hành động</th>

            ${saleUsers.map(([email,u],i)=>`<tr>

              <td><div class="mini-progress">

      <div class="table-wrap">
        <table class="data-table">
          <thead><tr>
            <th>Nhân viên</th><th>Module 1</th><th>Module 2</th><th>Module 3</th><th>Module 4</th><th>Điểm TB</th><th>Trạng thái</th>
          </tr></thead>
          <tbody>
            ${saleUsers.map(([email,u],i)=>{
              const s=u.quizScores;
              const avg=getAvgScore(u);
              function scoreCell(v) {
                if(v===undefined) return '<td style="color:var(--gray-400)">—</td>';
                const cls = v>=80?'tag-green':v>=70?'tag-blue':'tag-red';
                return `<td><span class="tag ${cls}">${v}</span></td>`;
              }
              return `<tr>
                <td><div class="user-cell">
                  <div class="mini-avatar" style="background:${avatarColors[i%5]}">${u.name.split(' ').pop()[0]}</div>
                  <div class="user-cell-name">${u.name}</div>
                </div></td>
                ${scoreCell(s[1])}${scoreCell(s[2])}${scoreCell(s[3])}${scoreCell(s[4])}

            }).join('')}

  } else if (adminTab==='add') {
    el.innerHTML = `
      <div class="panel" style="max-width:480px">
        <div class="panel-header"><div class="panel-title">Thêm nhân viên mới</div></div>
        <div class="panel-body">
          <div class="form-group"><label class="form-label">Họ và tên</label><input class="form-input" id="adm-name" placeholder="Nguyễn Văn A"></div>
          <div class="form-group"><label class="form-label">Email</label><input class="form-input" id="adm-email" placeholder="ten@jdiland.vn"></div>
          <div class="form-group"><label class="form-label">Chi nhánh</label>
            <select class="form-select" id="adm-branch"><option value="Hà Nội">Hà Nội</option><option value="Nha Trang">Nha Trang</option></select>
          </div>
          <div class="form-group"><label class="form-label">Mật khẩu tạm</label><input class="form-input" id="adm-pass" value="jdiland123"></div>
          <button class="btn-primary" onclick="adminAddUser()">Tạo tài khoản</button>
        </div>

// adminAddUser is defined above with Supabase

function viewUserDetail(email) {
  const u = USERS[email];
  function getProgBar(p) { return `<div style="display:flex;align-items:center;gap:8px"><div style="flex:1;height:6px;background:var(--gray-200);border-radius:3px;overflow:hidden"><div style="height:100%;background:var(--teal);width:${p}%;border-radius:3px"></div></div><span style="font-size:11px;width:32px;text-align:right">${p}%</span></div>`; }
  document.getElementById('modal-title').textContent = u.name;
  document.getElementById('modal-sub').textContent = `${email} · ${u.branch}`;
  document.getElementById('modal-body').innerHTML = `
    <div style="font-size:13px">
      ${MODULES.map(m=>`<div style="margin-bottom:12px">
        <div style="font-weight:600;margin-bottom:4px">Module ${m.id}: ${m.title}</div>
        ${getProgBar(u.progress[m.id]||0)}
        <div style="font-size:11px;color:var(--gray-400);margin-top:3px">Điểm kiểm tra: ${u.quizScores[m.id]??'Chưa làm'}</div>
      </div>`).join('')}
    </div>
  `;
  document.getElementById('modal-confirm-btn').style.display='none';
  document.getElementById('modal').classList.add('show');
}

function resetUserProgress(email) {
  const u = USERS[email];
  document.getElementById('modal-title').textContent = 'Xác nhận reset tiến độ';
  document.getElementById('modal-sub').textContent = `Reset toàn bộ tiến độ của ${u.name}? Hành động này không thể hoàn tác.`;
  document.getElementById('modal-body').innerHTML = '';
  document.getElementById('modal-confirm-btn').style.display='block';
  document.getElementById('modal-confirm-btn').onclick = () => {
    USERS[email].progress = {1:0,2:0,3:0,4:0};
    USERS[email].quizScores = {};
    USERS[email].completedLessons = [];
    closeModal();
    showToast(`✅ Đã reset tiến độ của ${u.name}`);
    renderAdminTab();
  };
  document.getElementById('modal').classList.add('show');
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function renderContent(el) {
  el.innerHTML = `
    <div class="panel">
      <div class="panel-header"><div class="panel-title">📝 Quản lý nội dung bài học</div></div>
      <div class="panel-body">
        <div class="info-box gold"><p>💡 Tính năng chỉnh sửa nội dung bài học trực tiếp đang được phát triển trong phiên bản tiếp theo. Hiện tại admin có thể chỉnh sửa file HTML để cập nhật nội dung.</p></div>
        <table class="data-table" style="margin-top:16px">
          <thead><tr><th>Module</th><th>Bài học</th><th>Thời lượng</th><th>Trạng thái</th></tr></thead>
          <tbody>
            ${MODULES.flatMap(m=>m.lessons_data.map(l=>`<tr>
              <td>${m.title}</td>
              <td>${l.title}</td>
              <td>${l.duration}</td>
              <td><span class="tag tag-green">✓ Có nội dung</span></td>
            </tr>`)).join('')}

        </table>

}

// ═══════════════════════════════════════════════
//  PROFILE
// ═══════════════════════════════════════════════
async function renderProfile(el) {
  const u = currentUser;
  const prog = u.progress;
  const totalPct = Math.round(Object.values(prog).reduce((a,b)=>a+b,0)/4);
  const completedModules = Object.values(prog).filter(p=>p===100).length;
  const scores = u.quizScores;
  const avgScore = Object.keys(scores).length ? Math.round(Object.values(scores).reduce((a,b)=>a+b,0)/Object.keys(scores).length) : 0;
  const avatarInitial = u.name ? u.name.split(' ').pop()[0].toUpperCase() : '?';
  const avatarSrc = u.avatar_url ? `<img src="${u.avatar_url}" alt="avatar">` : avatarInitial;

  el.innerHTML = `
    <div class="profile-wrap">
      <div class="profile-stats-row">
        <div class="profile-stat">
          <div class="profile-stat-num">${totalPct}%</div>
          <div class="profile-stat-label">Tiến độ học</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${completedModules}/4</div>
          <div class="profile-stat-label">Module hoàn thành</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num">${avgScore || '—'}</div>
          <div class="profile-stat-label">Điểm TB kiểm tra</div>
        </div>
      </div>

      <div class="profile-header-card">
        <div>
          <div class="avatar-upload-wrap" onclick="document.getElementById('avatar-file-input').click()">
            <div class="avatar-circle" id="avatar-preview">${avatarSrc}</div>
            <div class="avatar-overlay">📷</div>
          </div>
          <div class="avatar-upload-hint">Nhấn để đổi ảnh</div>
          <input type="file" id="avatar-file-input" accept="image/*" style="display:none" onchange="handleAvatarChange(event)">
        </div>
        <div class="profile-header-info">
          <div class="profile-header-name" id="profile-display-name">${u.name}</div>
          <div class="profile-header-email">${u.email}</div>
          <div class="profile-header-badges">
            <span class="profile-badge ${u.role==='admin'?'badge-role-admin':'badge-role-sale'}">${u.role==='admin'?'👑 Admin':'📚 Nhân viên Sale'}</span>
            <span class="profile-badge badge-branch">📍 ${u.branch==='nhatrang'?'Nha Trang':'Hà Nội'}</span>
          </div>
        </div>
      </div>

      <div class="profile-form-card">
        <div class="profile-form-header">✏️ Cập nhật thông tin</div>
        <div class="profile-form-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Họ và tên</label>
              <input class="form-input" id="pf-name" value="${u.name}" placeholder="Nguyễn Văn A">
            </div>
            <div class="form-group">
              <label class="form-label">Số điện thoại</label>
              <input class="form-input" id="pf-phone" value="${u.phone||''}" placeholder="0912 345 678">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Chi nhánh</label>
              <select class="form-select" id="pf-branch">
                <option value="hanoi" ${(u.branch==='hanoi'||u.branch==='Hà Nội')?'selected':''}>Hà Nội</option>
                <option value="nhatrang" ${(u.branch==='nhatrang'||u.branch==='Nha Trang')?'selected':''}>Nha Trang</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Email (không thể đổi)</label>
              <input class="form-input" value="${u.email}" disabled style="opacity:0.5">
            </div>
          </div>
          <div class="form-row-full">
            <div class="form-group">
              <label class="form-label">Giới thiệu bản thân</label>
              <textarea class="form-input" id="pf-bio" rows="3" placeholder="Vài dòng giới thiệu về bạn..." style="resize:vertical">${u.bio||''}</textarea>
            </div>
          </div>
          <div id="profile-save-msg" style="display:none;margin-bottom:14px;padding:10px 14px;border-radius:8px;font-size:13px"></div>
          <button class="profile-save-btn" id="pf-save-btn" onclick="saveProfile()">Lưu thay đổi</button>
        </div>
      </div>

      <div class="profile-form-card">
        <div class="profile-form-header">🔒 Đổi mật khẩu</div>
        <div class="profile-form-body">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Mật khẩu mới</label>
              <input class="form-input" type="password" id="pf-newpass" placeholder="Tối thiểu 6 ký tự">

              <label class="form-label">Xác nhận mật khẩu</label>
              <input class="form-input" type="password" id="pf-confirmpass" placeholder="Nhập lại mật khẩu mới">
            </div>
          </div>
          <div id="pass-save-msg" style="display:none;margin-bottom:14px;padding:10px 14px;border-radius:8px;font-size:13px"></div>
          <button class="profile-save-btn" onclick="savePassword()">Đổi mật khẩu</button>
        </div>
      </div>
    </div>
  `;
}

async function handleAvatarChange(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { showToast('⚠️ Ảnh tối đa 2MB'); return; }

  // Show local preview immediately
  const reader = new FileReader();
  reader.onload = (e) => {
    document.getElementById('avatar-preview').innerHTML = `<img src="${e.target.result}" alt="avatar">`;
  };
  reader.readAsDataURL(file);

  // Upload to Supabase Storage
  showToast('⏳ Đang tải ảnh lên...');
  const ext = file.name.split('.').pop();
  const fileName = `${currentUser.id}.${ext}`;
  const { data, error } = await sb.storage.from('avatars').upload(fileName, file, { upsert: true });

  if (error) {
    // Fallback: store as base64 in profile metadata
    const reader2 = new FileReader();
    reader2.onload = async (e) => {
      const base64 = e.target.result;
      await sb.auth.updateUser({ data: { avatar_url: base64 } });
      currentUser.avatar_url = base64;
      USERS[currentUser.email].avatar_url = base64;
      // update sidebar
      showToast('✅ Đã cập nhật ảnh đại diện!');
    };
    reader2.readAsDataURL(file);
    return;
  }

  const { data: urlData } = sb.storage.from('avatars').getPublicUrl(fileName);
  const avatarUrl = urlData.publicUrl;
  await sb.from('profiles').update({ avatar_url: avatarUrl }).eq('id', currentUser.id);
  await sb.auth.updateUser({ data: { avatar_url: avatarUrl } });
  currentUser.avatar_url = avatarUrl;
  USERS[currentUser.email].avatar_url = avatarUrl;
  showToast('✅ Đã cập nhật ảnh đại diện!');
}

async function saveProfile() {
  const name = document.getElementById('pf-name').value.trim();
  const phone = document.getElementById('pf-phone').value.trim();
  const branch = document.getElementById('pf-branch').value;
  const bio = document.getElementById('pf-bio').value.trim();
  const msgEl = document.getElementById('profile-save-msg');
  const btn = document.getElementById('pf-save-btn');

  if (!name) { msgEl.style.cssText='display:block;background:#fdf0ef;color:#c0392b'; msgEl.textContent='⚠ Vui lòng nhập họ tên.'; return; }

  btn.textContent = 'Đang lưu...'; btn.disabled = true;

  // Update Supabase auth metadata
  const { error: authErr } = await sb.auth.updateUser({ data: { full_name: name, branch, phone, bio } });
  // Update profiles table
  const { error: dbErr } = await sb.from('profiles').update({ full_name: name, branch }).eq('id', currentUser.id);

  btn.textContent = 'Lưu thay đổi'; btn.disabled = false;

  if (authErr || dbErr) {
    msgEl.style.cssText='display:block;background:#fdf0ef;color:#c0392b';
    msgEl.textContent='❌ Lỗi khi lưu. Thử lại sau.';
    return;
  }

  // Update local state
  currentUser.name = name;
  currentUser.phone = phone;
  currentUser.branch = branch;
  currentUser.bio = bio;
  USERS[currentUser.email] = { ...USERS[currentUser.email], name, phone, branch, bio };

  document.getElementById('sidebar-name').textContent = name;
  document.getElementById('profile-display-name').textContent = name;

  msgEl.style.cssText='display:block;background:#e8f7ef;color:#2d8a5e';
  msgEl.textContent='✅ Đã lưu thông tin thành công!';
  setTimeout(() => { msgEl.style.display='none'; }, 3000);
}

async function savePassword() {
  const newpass = document.getElementById('pf-newpass').value;
  const confirm = document.getElementById('pf-confirmpass').value;
  const msgEl = document.getElementById('pass-save-msg');

  if (!newpass || newpass.length < 6) { msgEl.style.cssText='display:block;background:#fdf0ef;color:#c0392b'; msgEl.textContent='⚠ Mật khẩu tối thiểu 6 ký tự.'; return; }
  if (newpass !== confirm) { msgEl.style.cssText='display:block;background:#fdf0ef;color:#c0392b'; msgEl.textContent='⚠ Mật khẩu xác nhận không khớp.'; return; }

  const { error } = await sb.auth.updateUser({ password: newpass });

  if (error) { msgEl.style.cssText='display:block;background:#fdf0ef;color:#c0392b'; msgEl.textContent='❌ Lỗi: ' + error.message; return; }

  document.getElementById('pf-newpass').value = '';
  document.getElementById('pf-confirmpass').value = '';
  msgEl.style.cssText='display:block;background:#e8f7ef;color:#2d8a5e';
  msgEl.textContent='✅ Đã đổi mật khẩu thành công!';
  setTimeout(() => { msgEl.style.display='none'; }, 3000);
}


function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3000);
}
</script>
